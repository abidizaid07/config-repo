server:
  port: 8084

spring:
  application:
    name: analytics-service

  data:
    mongodb:
      host: localhost
      port: 27017
      database: analytics_db
      username: admin
      password: admin123
      authentication-database: admin

  redis:
    host: localhost
    port: 6379
    timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,scheduledtasks
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.kromberg.analyticsservice: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.cache: DEBUG    